services:
  - type: web
    name: distributed-monitoring-web
    runtime: python
    rootDir: Backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: distributed-monitoring-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: distributed-monitoring-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: distributed-monitoring-redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: ""

  - type: worker
    name: distributed-monitoring-worker
    runtime: python
    rootDir: Backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A config worker -l info
    envVars:
      - key: SECRET_KEY
        fromService:
          type: web
          name: distributed-monitoring-web
          envVarKey: SECRET_KEY
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: distributed-monitoring-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: distributed-monitoring-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: distributed-monitoring-redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: ""

  - type: worker
    name: distributed-monitoring-beat
    runtime: python
    rootDir: Backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A config beat -l info
    envVars:
      - key: SECRET_KEY
        fromService:
          type: web
          name: distributed-monitoring-web
          envVarKey: SECRET_KEY
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: distributed-monitoring-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: distributed-monitoring-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: distributed-monitoring-redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: ""

  - type: redis
    name: distributed-monitoring-redis
    ipAllowList: []

databases:
  - name: distributed-monitoring-db
    databaseName: distributed_monitoring
    user: distributed_monitoring_user
