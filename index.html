<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Distributed Website Monitoring Platform</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }
    .card {
      width: 100%;
      max-width: 760px;
      background: #111827;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px;
    }
    h1 {
      margin-top: 0;
      font-size: 1.8rem;
    }
    p {
      line-height: 1.55;
      color: #cbd5e1;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }
    a {
      color: #93c5fd;
      text-decoration: none;
      border: 1px solid #3b82f6;
      border-radius: 8px;
      padding: 8px 12px;
      display: inline-block;
    }
    a:hover {
      background: rgba(59, 130, 246, 0.14);
    }
    code {
      color: #bfdbfe;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Distributed Website Monitoring Platform</h1>
    <p>
      This Netlify deployment is a static landing page for the project repository.
      The backend is hosted separately (Render) and linked below.
    </p>
    <p>
      Public backend endpoint:
      <code id="backend-url">https://distributed-monitoring-web.onrender.com</code>
    </p>
    <div class="links">
      <a href="/Backend/README.md">Backend README</a>
      <a id="ssr-link" href="https://distributed-monitoring-web.onrender.com/" target="_blank" rel="noopener noreferrer">SSR Home</a>
      <a id="api-link" href="https://distributed-monitoring-web.onrender.com/api/" target="_blank" rel="noopener noreferrer">API</a>
      <a id="admin-link" href="https://distributed-monitoring-web.onrender.com/admin/" target="_blank" rel="noopener noreferrer">Admin</a>
    </div>
  </main>
  <script>
    // Update this value after Render deploy if your service URL differs.
    const BACKEND_BASE_URL = "https://distributed-monitoring-web.onrender.com";
    const base = BACKEND_BASE_URL.replace(/\/+$/, "");
    document.getElementById("backend-url").textContent = base;
    document.getElementById("ssr-link").href = base + "/";
    document.getElementById("api-link").href = base + "/api/";
    document.getElementById("admin-link").href = base + "/admin/";
  </script>
</body>
</html>
